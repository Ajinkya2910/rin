# .github/workflows/release.yml
#
# HOW THIS WORKS:
# When you push a git tag like v0.1.0, this workflow builds rin on three
# machines — Linux, macOS ARM, macOS Intel — in parallel. Each uploads its
# binary as a build artifact. A final `release` job then collects all three
# and publishes ONE GitHub Release.
#
# WHY TWO JOBS:
# Previously every matrix job created the release itself. Running in parallel,
# they raced to create the same tag and GitHub rejected the losers with
# "already_exists: tag_name", leaving releases with missing binaries. Creating
# the release exactly once, after all builds finish, removes that race.
#
# USAGE:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# After ~10 minutes, check https://github.com/Ajinkya2910/rin/releases
# You'll see three downloadable files:
#   rin-x86_64-unknown-linux-musl.tar.gz   (Linux HPC)
#   rin-aarch64-apple-darwin.tar.gz        (macOS ARM / Apple Silicon)
#   rin-x86_64-apple-darwin.tar.gz         (macOS Intel)

name: Release

# Only run when a version tag is pushed
on:
  push:
    tags:
      - "v*"

# Permission to create releases and upload assets
permissions:
  contents: write

jobs:
  build:
    # matrix.include runs this job three times in parallel, once per target.
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      # Step 1: Check out the code
      - uses: actions/checkout@v4

      # Step 2: Install the Rust toolchain
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Step 3: Compile rin in release mode (optimized binary)
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # Step 4: Package the binary into a tarball
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../rin-${{ matrix.target }}.tar.gz rin
          cd ../../..

      # Step 5: Hand the tarball off to the release job as an artifact.
      # No release is created here — that happens once, in `release` below.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rin-${{ matrix.target }}
          path: rin-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    # Wait for all three builds, then publish a single release with all assets.
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Collect every build artifact, flattened into one directory.
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # Create the release exactly once and attach all three binaries.
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
