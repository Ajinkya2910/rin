# .github/workflows/release.yml
#
# HOW THIS WORKS:
# When you push a git tag like v0.1.0, this workflow runs on three machines
# simultaneously — Linux, macOS ARM, macOS Intel. Each compiles rv into a
# standalone binary, zips it, and uploads it to GitHub Releases.
#
# USAGE:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# After ~10 minutes, check https://github.com/Ajinkya2910/rv/releases
# You'll see three downloadable files:
#   rv-x86_64-unknown-linux-gnu.tar.gz    (Linux HPC)
#   rv-aarch64-apple-darwin.tar.gz        (macOS ARM / Apple Silicon)
#   rv-x86_64-apple-darwin.tar.gz         (macOS Intel)

name: Release

# Only run when a version tag is pushed
on:
  push:
    tags:
      - "v*"

# Permission to create releases and upload assets
permissions:
  contents: write

jobs:
  build:
    # RUST CONCEPT: Cross-compilation targets
    # Rust calls each OS+CPU combo a "target triple":
    #   x86_64-unknown-linux-gnu  = Linux on Intel/AMD (your HPC)
    #   aarch64-apple-darwin      = macOS on Apple Silicon (your Mac)
    #   x86_64-apple-darwin       = macOS on older Intel Macs
    #
    # matrix.include runs this job three times in parallel, once per target.
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      # Step 1: Check out the code
      - uses: actions/checkout@v4

      # Step 2: Install the Rust toolchain
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Step 3: Compile rv in release mode (optimized binary)
      # --release turns on optimizations — the binary is ~5x smaller and faster
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # Step 4: Package the binary into a tarball
      # The binary is at target/{target}/release/rv
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../rv-${{ matrix.target }}.tar.gz rv
          cd ../../..

      # Step 5: Upload to GitHub Releases
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: rv-${{ matrix.target }}.tar.gz